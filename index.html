<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Idílico Premium Barbershop</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#111;
color:white;
}

header{
text-align:center;
padding:30px 20px;
background:#000;
}

.logo{
width:220px;
max-width:90%;
border-radius:15px;
}

.titulo{
font-size:2rem;
color:#d4af37;
margin-top:15px;
}

.subtitulo{
margin-top:10px;
color:#ccc;
}

.hero{
width:100%;
max-height:500px;
object-fit:cover;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:#1b1b1b;
padding:20px;
border-radius:15px;
margin-top:20px;
box-shadow:0 0 15px rgba(212,175,55,.2);
}

h2{
color:#d4af37;
margin-bottom:15px;
text-align:center;
}

input,
select{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#d4af37;
color:black;
font-weight:bold;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.galeria img{
width:100%;
border-radius:15px;
margin-top:15px;
}

.contacto{
text-align:center;
margin-top:25px;
line-height:2;
}

.exito{
display:none;
background:#1f8f4d;
padding:15px;
border-radius:10px;
margin-top:15px;
text-align:center;
}
</style>
</head>

<body>

<header>

<img src="logo.jpg" class="logo">

<h1 class="titulo">Idílico Premium Barbershop</h1>

<p class="subtitulo">
Agenda tu cita de forma rápida y segura
</p>

</header>

<img src="barberia.jpg" class="hero">

<div class="container">

<div class="card">

<h2>Reserva tu cita</h2>

<input type="text" id="nombre" placeholder="Nombre completo">
<input type="tel" id="telefono" placeholder="Número de teléfono">
<select id="barbero">
<option value="">Seleccione un barbero</option>
<option>Jesús</option>
<option>Mateo</option>
<option>Carlos</option>
</select>

<select id="servicio">
<option value="">Seleccione un servicio</option>
<option>Clásico</option>
<option>Cejas</option>
<option>Barba + Cejas</option>
</select>

<input type="date" id="fecha">

<input type="time" id="hora">

<button onclick="reservar()">
Confirmar cita
</button>

<div id="mensaje" class="exito">
✅ Tu cita fue registrada correctamente.
</div>

</div>

<div class="card galeria">

<h2>Nuestros Servicios</h2>

<img src="servicios.jpg">

</div>

<div class="contacto">

<h2>Contacto</h2>

<p>📱 321 497 57 51</p>

<p>📸 Instagram: @idilicopremium</p>

</div>

</div>

<script>

async function reservar(){

const nombre =
document.getElementById("nombre").value;

const barbero =
document.getElementById("barbero").value;

const servicio =
document.getElementById("servicio").value;

const fecha =
document.getElementById("fecha").value;

const hora =
document.getElementById("hora").value;

if(!nombre || !barbero || !servicio || !fecha || !hora){

alert("Complete todos los campos");

return;
}

try{

await fetch(
"https://script.google.com/macros/s/AKfycbwxddpRUdhBVxmfV2ivtHJqiNXocp4kI4gMzkSl8xo8mQqVtx-ji4nQgSmWfvu5Eh4/exec",
{
method:"POST",
body:JSON.stringify({
nombre:nombre,
barbero:barbero,
servicio:servicio,
fecha:fecha,
hora:hora
})
}
);

document.getElementById("mensaje").style.display="block";

document.getElementById("nombre").value="";
document.getElementById("barbero").value="";
document.getElementById("servicio").value="";
document.getElementById("fecha").value="";
document.getElementById("hora").value="";

}catch(error){

alert("Error al guardar la cita");

console.error(error);

}

}

</script>

</body>
</html>
