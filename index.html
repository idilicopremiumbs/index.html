<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbería Elite - Reserva tu cita</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111;
    color:#fff;
}

header{
    background:#000;
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-size:2.5rem;
}

header p{
    color:#bbb;
    margin-top:10px;
}

.hero{
    text-align:center;
    padding:50px 20px;
}

.hero h2{
    margin-bottom:15px;
}

.container{
    max-width:600px;
    margin:20px auto 50px;
    background:#1c1c1c;
    padding:25px;
    border-radius:15px;
}

label{
    display:block;
    margin-top:15px;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:#d4af37;
    color:#000;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#confirmacion{
    display:none;
    text-align:center;
}

.whatsapp{
    background:#25D366;
    color:white;
}

footer{
    text-align:center;
    padding:20px;
    color:#888;
}
</style>
</head>
<body>

<header>
    <h1>💈 Idilico Premium Barbershop </h1>
    <p>Cortes modernos, barba y estilo profesional</p>
</header>

<section class="hero">
    <h2>Reserva tu cita online</h2>
    <p>Selecciona tu servicio y horario disponible.</p>
</section>

<div class="container" id="formulario">

    <label>Nombre completo</label>
    <input type="text" id="nombre">

    <label>Servicio</label>
    <select id="servicio">
        <option>Corte clásico</option>
        <option>Fade</option>
        <option>Barba</option>
        <option>Corte + Barba</option>
    </select>

    <label>Fecha</label>
    <input type="date" id="fecha">

    <label>Hora</label>
    <input type="time" id="hora">

    <button onclick="reservar()">
        Confirmar cita
    </button>

</div>

<div class="container" id="confirmacion">

    <h2>✅ Cita Confirmada</h2>

    <br>

    <p><strong>Cliente:</strong> <span id="cNombre"></span></p>
    <p><strong>Servicio:</strong> <span id="cServicio"></span></p>
    <p><strong>Fecha:</strong> <span id="cFecha"></span></p>
    <p><strong>Hora:</strong> <span id="cHora"></span></p>

    <br>

    <a id="whatsappBtn" target="_blank">
        <button class="whatsapp">
            Compartir por WhatsApp
        </button>
    </a>

</div>

<footer>
    © 2026 Idilico Premium Barbershop
</footer>

<script>

function reservar(){

    let nombre = document.getElementById("nombre").value;
    let servicio = document.getElementById("servicio").value;
    let fecha = document.getElementById("fecha").value;
    let hora = document.getElementById("hora").value;
fetch("https://script.google.com/macros/s/AKfycbwnPyKG_VF5cuKqVhbq6U7VcPBqmlIIp_ealwFqIgOmespOxk_1k2f6NAJ7AknR2fM/exec", {
  method: "POST",
  body: JSON.stringify({
    nombre: nombre,
    servicio: servicio,
    fecha: fecha,
    hora: hora
  })
})
.then(() => console.log("Cita guardada"))
.catch(error => console.error(error));
    if(nombre === "" || fecha === "" || hora === ""){
        alert("Completa todos los campos.");
        return;
    }

    document.getElementById("cNombre").textContent = nombre;
    document.getElementById("cServicio").textContent = servicio;
    document.getElementById("cFecha").textContent = fecha;
    document.getElementById("cHora").textContent = hora;

    let mensaje =
`💈 Cita Confirmada

Cliente: ${nombre}
Servicio: ${servicio}
Fecha: ${fecha}
Hora: ${hora}`;

    document.getElementById("whatsappBtn").href =
        "https://wa.me/?text=" + encodeURIComponent(mensaje);

    document.getElementById("formulario").style.display = "none";
    document.getElementById("confirmacion").style.display = "block";
}

</script>

</body>
</html>
