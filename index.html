<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Idílico Premium Barbershop</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#000;
padding:30px;
text-align:center;
}

.logo{
width:220px;
max-width:90%;
border-radius:15px;
}

.titulo{
font-size:2rem;
color:#d4af37;
margin-top:15px;
}

.subtitulo{
color:#ccc;
margin-top:10px;
}

.hero{
width:100%;
max-height:500px;
object-fit:cover;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:#1b1b1b;
padding:25px;
border-radius:15px;
margin-top:20px;
box-shadow:0 0 15px rgba(212,175,55,.2);
}

h2{
text-align:center;
color:#d4af37;
margin-bottom:20px;
}

input,
select{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#d4af37;
color:black;
font-size:17px;
font-weight:bold;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.galeria img{
width:100%;
border-radius:15px;
}

.contacto{
text-align:center;
margin-top:25px;
line-height:2;
}

.exito{
display:none;
background:#0f5132;
border:1px solid #198754;
padding:20px;
border-radius:10px;
margin-top:15px;
text-align:center;
font-size:15px;
line-height:1.6;
}

</style>
</head>

<body>

<header>

<img src="logo.jpg" class="logo">

<h1 class="titulo">
Idílico Premium Barbershop
</h1>

<p class="subtitulo">
Agenda tu cita de forma rápida y segura
</p>

</header>

<img src="barberia.jpg" class="hero">

<div class="container">

<div class="card">

<h2>Reserva tu cita</h2>

<input
type="text"
id="nombre"
placeholder="Nombre completo"
>

<input
type="tel"
id="telefono"
placeholder="Número de teléfono"
>

<select id="barbero">
<option value="">Seleccione un barbero</option>
<option>Jesús</option>
<option>Mateo</option>
<option>Carlos</option>
</select>

<select id="servicio">
<option value="">Seleccione un servicio</option>
<option>Clásico</option>
<option>Cejas</option>
<option>Barba + Cejas</option>
</select>

<input type="date" id="fecha">

<input type="time" id="hora">

<button onclick="reservar()">
Confirmar cita
</button>

<div id="mensaje" class="exito"></div>

</div>

<div class="card galeria">

<h2>Nuestros Servicios</h2>

<img src="servicios.jpg">

</div>

<div class="contacto">

<h2>Contacto</h2>

<p>📱 321 497 57 51</p>

<p>📸 Instagram: @idilicopremium</p>

</div>

</div>

<script>

const URL_SCRIPT =
"https://script.google.com/macros/s/AKfycbxFic8w-IFJrEg4FWBGJlHOWbFB__eD1yJHQoH4JwIQGlpfPcnE9eAbN-c5PEpI_4w/exec";

async function reservar(){

const nombre =
document.getElementById("nombre").value.trim();

const telefono =
document.getElementById("telefono").value.trim();

const barbero =
document.getElementById("barbero").value;

const servicio =
document.getElementById("servicio").value;

const fecha =
document.getElementById("fecha").value;

const hora =
document.getElementById("hora").value;

if(!nombre || !telefono || !barbero || !servicio || !fecha || !hora){

alert("Por favor complete todos los campos.");

return;
}

/* Validación Colombia */

const telefonoLimpio =
telefono.replace(/\D/g,'');

if(!/^3\d{9}$/.test(telefonoLimpio)){

alert(
"Ingrese un número celular colombiano válido. Ejemplo: 3001234567"
);

return;
}

try{

const respuesta = await fetch(
URL_SCRIPT,
{
method:"POST",
body:JSON.stringify({
nombre,
telefono:telefonoLimpio,
barbero,
servicio,
fecha,
hora
})
}
);

const resultado =
await respuesta.json();

if(resultado.resultado === "ok"){

document.getElementById("mensaje").style.display="block";

document.getElementById("mensaje").innerHTML = `
✅ <strong>Cita confirmada exitosamente</strong><br><br>
Gracias por elegir <b>Idílico Premium Barbershop</b>.<br>
Tu reserva fue registrada correctamente.<br><br>
Te esperamos el <b>${fecha}</b> a las <b>${hora}</b>.
`;

document.getElementById("nombre").value="";
document.getElementById("telefono").value="";
document.getElementById("barbero").value="";
document.getElementById("servicio").value="";
document.getElementById("fecha").value="";
document.getElementById("hora").value="";

}else{

alert("No fue posible registrar la cita.");

}

}catch(error){

alert("Error de conexión con el servidor.");

console.error(error);

}

}

</script>

</body>
</html>
